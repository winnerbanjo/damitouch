<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DamiTouch Airbnb | Private Bookings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section class="admin-login" data-admin-login>
        <img src="assets/logo.jpeg" alt="DamiTouch Airbnb logo" />
        <p class="eyebrow">Private link</p>
        <h1>Booking admin</h1>
        <p>Enter the password to view booking requests saved from this browser.</p>
        <form data-password-form>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button full-button" type="submit">Unlock bookings</button>
        </form>
        <p class="admin-error" data-admin-error></p>
      </section>

      <section class="admin-dashboard" data-admin-dashboard hidden>
        <div class="admin-topbar">
          <div>
            <p class="eyebrow">DamiTouch Airbnb</p>
            <h1>Booking requests</h1>
          </div>
          <a class="secondary-button" href="index.html">Back to site</a>
        </div>
        <div class="admin-list page-list" data-admin-list></div>
        <button class="secondary-button full-button" type="button" data-clear-bookings>
          Clear saved requests
        </button>
      </section>
    </main>

    <div class="toast" data-toast role="status" aria-live="polite"></div>
    <script src="admin.js"></script>
  </body>
</html>
